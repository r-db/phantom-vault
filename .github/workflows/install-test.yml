name: Install Test Matrix

# Verifies install.sh works end-to-end on every supported OS / shell scenario
# we ship to. Runs on every push to main and every PR that touches install.sh.
# A green status check here is the pre-tag gate — if this is red, do not release.

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - '.github/workflows/install-test.yml'
  pull_request:
    paths:
      - 'install.sh'
      - '.github/workflows/install-test.yml'
  workflow_dispatch:

jobs:
  install-test:
    name: ${{ matrix.scenario }} on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon — most common end-user path.
          # Default state: /opt/homebrew/bin exists + writable → no-sudo branch.
          - scenario: macos-arm64-homebrew
            runner: macos-14
            shell: bash

          # macOS Apple Silicon — Homebrew NOT installed (rare but real).
          # Exercises the sudo /usr/local/bin branch including mkdir -p.
          - scenario: macos-arm64-no-homebrew
            runner: macos-14
            shell: bash
            pre: |
              # Hide Homebrew from the install script's detection.
              sudo mv /opt/homebrew /opt/homebrew.hidden

          # macOS Intel — /usr/local/bin already exists from Homebrew.
          - scenario: macos-x64
            runner: macos-13
            shell: bash

          # Linux x64 — /usr/local/bin exists, runner has passwordless sudo.
          - scenario: ubuntu-latest
            runner: ubuntu-latest
            shell: bash

          # Linux x64 with zsh as login shell — verifies shell-detection branch.
          - scenario: ubuntu-zsh
            runner: ubuntu-latest
            shell: bash
            pre: |
              sudo apt-get update && sudo apt-get install -y zsh
              sudo chsh -s "$(which zsh)" "$USER"

    steps:
      - uses: actions/checkout@v4

      - name: Pre-flight
        if: matrix.pre != ''
        run: ${{ matrix.pre }}

      - name: Run installer
        run: bash -x install.sh
        env:
          # CI runners are non-interactive — sudo NOPASSWD is preconfigured.
          PHANTOM_NO_SUDO: '0'

      - name: phantom is on PATH
        run: |
          which phantom || { echo "phantom NOT on PATH after install"; exit 1; }
          phantom --version

      - name: vault-mcp is on PATH
        run: |
          which vault-mcp || { echo "vault-mcp NOT on PATH after install"; exit 1; }
          vault-mcp --help >/dev/null 2>&1 || true

      - name: Idempotent re-install
        run: |
          # Second invocation must not blow up or duplicate PATH entries.
          bash install.sh
          phantom --version

      - name: PHANTOM_NO_SUDO fallback path
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          # Remove the system install, force user-scope.
          sudo rm -f /usr/local/bin/phantom /usr/local/bin/vault-mcp
          PHANTOM_NO_SUDO=1 bash install.sh
          # ~/.local/bin should now hold the binary.
          test -x "$HOME/.local/bin/phantom" || { echo "user-scope fallback failed"; exit 1; }

      - name: Cleanup (macos-arm64-no-homebrew)
        if: matrix.scenario == 'macos-arm64-no-homebrew' && always()
        run: sudo mv /opt/homebrew.hidden /opt/homebrew || true
